<body>
    <div class="page-wrapper">
        <header class="header">
            <a class="back-link" href="user-dashboard.html">← Back to Cafeterias</a>
            <div class="cafeteria-meta">
                <h1 id="cafeteriaName">Cafeteria</h1>

            </div>
        </header>

        <main>
            <section class="menu-section" id="menuSection"></section>
            <section class="takeout-section" id="takeoutSection"></section>
            
            <section class="rating-section" id="ratingSection">
                <div class="rating-header">
                    <h2>Reviews & Ratings</h2>
                    <div class="average-rating">
                        <span class="avg-score" id="avgScore">0.0</span>
                        <div class="stars-summary">
                            <div class="stars-display" id="avgStars">
                                <!-- generated stars -->
                            </div>
                            <span class="total-reviews" id="totalReviews">0 reviews</span>
                        </div>
                    </div>
                </div>

                <div class="add-review">
                    <h3>Leave a Review</h3>
                    <div class="star-selector" id="starSelector">
                        <svg viewBox="0 0 24 24" data-value="1"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                        <svg viewBox="0 0 24 24" data-value="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                        <svg viewBox="0 0 24 24" data-value="3"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                        <svg viewBox="0 0 24 24" data-value="4"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                        <svg viewBox="0 0 24 24" data-value="5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                    </div>
                    <textarea class="review-textarea" id="reviewComment" placeholder="Tell us about your experience (optional)"></textarea>
                    <button class="submit-review-btn" id="submitReviewBtn">Submit Review</button>
                </div>

                <div class="reviews-list" id="reviewsList">
                    <!-- fetched reviews go here -->

            </section>

            <div class="order-feedback" id="orderFeedback" role="status"></div>
            <div class="notice-banner" id="noticeBanner"></div>

                    <span id="selectedCount">0 items selected</span>
                    <button class="checkout-button" id="checkoutButton">Proceed to Checkout</button>

            </div>
        </main>

        function getPageCafeteriaId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        }

        let feedbackTimeout;

        function showFeedback(message, tone = 'success') {
            const feedback = document.getElementById('orderFeedback');
            feedback.textContent = message;
            feedback.className = `order-feedback order-feedback--${tone} is-visible`;

            clearTimeout(feedbackTimeout);
            
            feedbackTimeout = setTimeout(() => {
                feedback.textContent = '';
                feedback.className = 'order-feedback';
            }, 4000);
        }

        function resolveImageSrc(src) {
            if (!src) return 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=200';
            if (/^https?:\/\//i.test(src)) return src;
            if (src.startsWith('/photos/')) return src.slice(1); // /photos/... -> photos/...
            return src;
        }

        function renderTakeoutSection(cafeteriaId, cafeteria) {
            const takeoutSection = document.getElementById('takeoutSection');
            const takeout = cafeteria.takeout;

            if (!takeout || !takeout.items || takeout.items.length === 0) {
                takeoutSection.style.display = 'none';
                return;
            }

            takeoutSection.style.display = '';
            takeoutSection.innerHTML = `
                <div class="takeout-header">
                    <h2>${takeout.title}</h2>
                    <p>${takeout.description}</p>
                </div>
                <div class="takeout-grid">
                    ${takeout.items.map((item, index) => `
                        <article class="takeout-item">
                            <div class="takeout-item-image-container">
                                <img src="${resolveImageSrc(item.image)}" alt="${item.name}" class="takeout-item-image">
                            </div>
                            <div class="takeout-item-content">
                                <div class="takeout-item-top">
                                    <span class="takeout-item-name">${item.name}</span>
                                    <span class="takeout-item-price">${item.price}</span>
                                </div>
                                <p class="takeout-item-description">${item.description}</p>
                                ${item.readyIn ? `<div class="takeout-meta">${item.readyIn}</div>` : ''}
                                ${item.addOns && item.addOns.length ? `
                                    <div class="takeout-addons">
                                        <span class="takeout-addons-label">Customize</span>
                                        <div class="takeout-addons-options">
                                            ${item.addOns.map((addOn, addOnIndex) => `
                                                <label class="addon-option">
                                                    <input type="checkbox" class="addon-checkbox" data-addon-index="${addOnIndex}">
                                                    <span>${addOn.name} <span class="price">${addOn.price}</span></span>
                                                </label>
                                            `).join('')}
                                        </div>
                                    </div>
                                ` : ''}
                                <div class="order-actions">
                                    <button class="add-to-cart-btn" data-item-source="takeout" data-item-index="${index}">Add to Cart</button>
                                </div>
                            </div>
                        </article>
                    `).join('')}
                </div>
            `;
        }

        let selectedItems = [];

        function updateCheckoutBar() {
            const checkoutBar = document.getElementById('checkoutBar');
            const countDisplay = document.getElementById('selectedCount');
            
            if (selectedItems.length > 0) {
                checkoutBar.style.display = 'flex';
                countDisplay.textContent = `${selectedItems.length} item${selectedItems.length > 1 ? 's' : ''} selected`;
            } else {
                checkoutBar.style.display = 'none';
            }
        }

        function attachOrderHandlers(cafeteriaId, cafeteria) {
            const buttons = document.querySelectorAll('.add-to-cart-btn');

            buttons.forEach(button => {
                button.addEventListener('click', () => {
                    const source = button.dataset.itemSource || 'takeout';
                    let item;
                    let categoryLabel = '';
                    let card;

                    if (source === 'menu') {
                        const sectionIndex = Number(button.dataset.sectionIndex);
                        const itemIndex = Number(button.dataset.itemIndex);
                        const section = cafeteria.menu && cafeteria.menu[sectionIndex];

                        if (!section) {
                            showFeedback('Unable to process that order right now.', 'error');
                            return;
                        }

                        item = section.items && section.items[itemIndex];
                        categoryLabel = section.category || 'Cafeteria Menu';
                        card = button.closest('.menu-item');
                    } else {
                        const takeout = cafeteria.takeout;
                        const itemIndex = Number(button.dataset.itemIndex);

                        if (!takeout || !takeout.items) {
                            showFeedback('Unable to process that order right now.', 'error');
                            return;
                        }

                        item = takeout.items[itemIndex];
                        categoryLabel = takeout.title || 'Takeout Order';
                        card = button.closest('.takeout-item');
                    }

                    if (!item) {
                        showFeedback('Unable to process that order right now.', 'error');
                        return;
                    }

                    const selectedAddOns = item.addOns && card
                        ? Array.from(card.querySelectorAll('.addon-checkbox:checked'))
                            .map(checkbox => item.addOns[Number(checkbox.dataset.addonIndex)])
                            .filter(Boolean)
                        : [];

                    selectedItems.push({
                        name: item.name,
                        price: item.price,
                        addOns: selectedAddOns,
                        category: categoryLabel
                    });

                    if (card) {
                        card.querySelectorAll('.addon-checkbox').forEach(checkbox => {
                            checkbox.checked = false;
                        });
                    }

                    updateCheckoutBar();
                    showFeedback(`${item.name} added to cart`, 'success');
                });
            });
        }

        function renderCafeteriaPage() {
            const cafeteriaId = getPageCafeteriaId();
            const cafeteria = cafeteriaData[cafeteriaId];

            if (!cafeteria) {
                window.location.href = 'user-dashboard.html';
                return;
            }

            document.getElementById('cafeteriaName').textContent = cafeteria.name;
            document.getElementById('cafeteriaDescription').textContent = cafeteria.description;

            const detailsContainer = document.getElementById('cafeteriaDetails');
            detailsContainer.innerHTML = cafeteria.details
                .map(detail => `<span>${detail}</span>`)
                .join('');

            const menuContainer = document.getElementById('menuSection');
            menuContainer.innerHTML = cafeteria.menu.map((section, sectionIndex) => `
                <article class="menu-category">
                    <h2>${section.category}</h2>
                    ${section.items.map((item, itemIndex) => `
                        <div class="menu-item">
                            <div class="item-image-container">
                                <img src="${resolveImageSrc(item.image)}" alt="${item.name}" class="item-image">
                            </div>
                            <div class="item-content">
                                <div class="item-header">
                                    <span class="item-name">${item.name}</span>
                                    <span class="item-price">${item.price}</span>
                                </div>
                                <p class="item-description">${item.description}</p>
                                ${item.addOns && item.addOns.length ? `
                                    <div class="takeout-addons">
                                        <span class="takeout-addons-label">Customize</span>
                                        <div class="takeout-addons-options">
                                            ${item.addOns.map((addOn, addOnIndex) => `
                                                <label class="addon-option">
                                                    <input type="checkbox" class="addon-checkbox" data-addon-index="${addOnIndex}">
                                                    <span>${addOn.name} <span class="price">${addOn.price}</span></span>
                                                </label>
                                            `).join('')}
                                        </div>
                                    </div>
                                ` : ''}
                                <div class="order-actions menu-order-actions">
                                    <button class="add-to-cart-btn" data-item-source="menu" data-section-index="${sectionIndex}" data-item-index="${itemIndex}">Add to Cart</button>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </article>
            `).join('');

            renderTakeoutSection(cafeteriaId, cafeteria);

            attachOrderHandlers(cafeteriaId, cafeteria);

            const noticeBanner = document.getElementById('noticeBanner');
            noticeBanner.textContent = cafeteria.notice;
            noticeBanner.style.display = cafeteria.notice ? 'block' : 'none';
        }

        renderCafeteriaPage();
        
        document.getElementById('checkoutButton').addEventListener('click', () => {
            if (selectedItems.length === 0) {
                showFeedback('No items selected', 'error');
                return;
            }
            
            sessionStorage.setItem('selectedItems', JSON.stringify(selectedItems));
            
            const cafeteriaId = getPageCafeteriaId();
            const cafeteria = cafeteriaData[cafeteriaId];
            sessionStorage.setItem('checkoutCafeteria', JSON.stringify({
                id: cafeteriaId,
                name: cafeteria.name
            }));
            
            window.location.href = 'checkout.html';
        });

        // --- Ratings Logic ---
        let currentRating = 0;
        const starSelector = document.getElementById('starSelector');
        const stars = starSelector.querySelectorAll('svg');

        stars.forEach(star => {
            star.addEventListener('mouseover', (e) => {
                const value = parseInt(e.currentTarget.dataset.value);
                stars.forEach((s, idx) => {
                    if (idx < value) s.classList.add('hover');
                    else s.classList.remove('hover');
                });
            });

            star.addEventListener('mouseout', () => {
                stars.forEach(s => s.classList.remove('hover'));
            });

            star.addEventListener('click', (e) => {
                currentRating = parseInt(e.currentTarget.dataset.value);
                stars.forEach((s, idx) => {
                    if (idx < currentRating) s.classList.add('selected');
                    else s.classList.remove('selected');
                });
            });
        });

        async function fetchRatings() {
            const cafeteriaId = getPageCafeteriaId();
            const { ok, data } = await apiCall(`/ratings/${cafeteriaId}`);
            if (!ok || !data) return;

            document.getElementById('avgScore').textContent = data.average.toFixed(1);
            document.getElementById('totalReviews').textContent = `${data.total} reviews`;
            
            // Draw average stars
            let avgStarsHTML = '';
            for (let i = 1; i <= 5; i++) {
                if (i <= Math.round(data.average)) {
                    avgStarsHTML += '<span class="star-icon filled">★</span>';
                } else {
                    avgStarsHTML += '<span class="star-icon">☆</span>';
                }
            }
            document.getElementById('avgStars').innerHTML = avgStarsHTML;

            // Render reviews
            const reviewsList = document.getElementById('reviewsList');
            if (data.reviews.length === 0) {
                reviewsList.innerHTML = '<p style="color: #851616; font-size: 13px;">No reviews yet. Be the first!</p>';
            } else {
                reviewsList.innerHTML = data.reviews.map(r => `
                    <div class="review-card">
                        <div class="review-card-header">
                            <span class="reviewer-name">${r.userName}</span>
                            <span class="review-date">${new Date(r.createdAt).toLocaleDateString()}</span>
                        </div>
                        <div class="review-stars" style="color: #f4a261; margin-bottom: 8px;">
                            ${'★'.repeat(r.score)}${'☆'.repeat(5 - r.score)}
                        </div>
                        ${r.comment ? `<p class="review-comment">${r.comment}</p>` : ''}
                    </div>
                `).join('');
            }
        }

        document.getElementById('submitReviewBtn').addEventListener('click', async () => {
            if (!(await isAuthenticated())) {
                showFeedback('Please login to leave a review', 'error');
                return;
            }

            if (currentRating === 0) {
                showFeedback('Please select a star rating', 'error');
                return;
            }

            const comment = document.getElementById('reviewComment').value.trim();
            const cafeteriaId = getPageCafeteriaId();

            document.getElementById('submitReviewBtn').disabled = true;
            const { ok, data } = await apiCall('/ratings/', 'POST', {
                cafeteriaId,
                score: currentRating,
                comment
            });

            if (ok && data?.success) {
                showFeedback('Review submitted successfully!', 'success');
                document.getElementById('reviewComment').value = '';
                currentRating = 0;
                stars.forEach(s => s.classList.remove('selected'));
                fetchRatings();
            } else {
                showFeedback(data?.message || 'Failed to submit review', 'error');
            }
            document.getElementById('submitReviewBtn').disabled = false;
        });

        // Initialize ratings on load
        fetchRatings();
    </script>
</body>
</html>
