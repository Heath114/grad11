<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafeteria Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>University Food Delivery System</h1>
            <p>Sign in to your account</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="phone">Username / Phone Number</label>
                <input type="text" id="phone" placeholder="Enter username or phone number" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>

            <div class="error-message" id="errorMessage">
                Incorrect username or password
            </div>

            <button type="submit" class="login-btn">Sign In</button>
        </form>

        <div class="register-link">
            <span>Don't have an account?</span>
            <a href="register.html">Register</a>
        </div>

        <div class="browse-section">
            <span class="browse-copy">Just browsing?</span>
            <a class="browse-link" href="user-dashboard.html">Explore Cafeteria Menus</a>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        const REDIRECT_STORAGE_KEY = 'redirectAfterLogin';

        const adminAccounts = {
            'admin1': { password: 'admin1', cafeteriaId: '1', cafeteriaName: 'Engineering Cafeteria 1' },
            'admin2': { password: 'admin2', cafeteriaId: '2', cafeteriaName: 'Engineering Cafeteria 2' },
            'admin3': { password: 'admin3', cafeteriaId: '3', cafeteriaName: 'Medicine Cafeteria' },
            'admin4': { password: 'admin4', cafeteriaId: '4', cafeteriaName: 'Business Cafeteria' },
            'admin5': { password: 'admin5', cafeteriaId: '5', cafeteriaName: 'Science Cafeteria' },
            'admin6': { password: 'admin6', cafeteriaId: '6', cafeteriaName: 'Arts Cafeteria' },
            'admin7': { password: 'admin7', cafeteriaId: '7', cafeteriaName: 'Law Cafeteria' },
            'admin8': { password: 'admin8', cafeteriaId: '8', cafeteriaName: 'Central Library Cafe' }
        };

        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');

        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value.trim();

            if (adminAccounts[phone] && adminAccounts[phone].password === password) {
                sessionStorage.setItem('userType', 'admin');
                sessionStorage.setItem('username', phone);
                sessionStorage.setItem('cafeteriaId', adminAccounts[phone].cafeteriaId);
                sessionStorage.setItem('cafeteriaName', adminAccounts[phone].cafeteriaName);
                sessionStorage.removeItem(REDIRECT_STORAGE_KEY);
                window.location.href = `admin-dashboard.html?id=${adminAccounts[phone].cafeteriaId}`;
                return;
            }

            const result = login(phone, password);

            if (result.success) {
                const redirectUrl = sessionStorage.getItem(REDIRECT_STORAGE_KEY);

                if (redirectUrl) {
                    sessionStorage.removeItem(REDIRECT_STORAGE_KEY);
                    window.location.href = redirectUrl;
                } else {
                    window.location.href = 'user-dashboard.html';
                }
            } else {
                errorMessage.textContent = result.message;
                errorMessage.classList.add('show');
                
                setTimeout(() => {
                    errorMessage.classList.remove('show');
                }, 3000);
            }
        });

        document.getElementById('phone').addEventListener('input', () => {
            errorMessage.classList.remove('show');
        });
        
        document.getElementById('password').addEventListener('input', () => {
            errorMessage.classList.remove('show');
        });
    </script>
</body>
</html>
