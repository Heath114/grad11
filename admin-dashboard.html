<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin-dashboard.css">
</head>
<body>
    <div class="header">
        <div class="header-content">
            <h1>Orders</h1>
            <p>Admin Dashboard</p>
            <button class="logout-btn" id="adminLogoutBtn" type="button">Sign Out</button>
        </div>
    </div>

    <div class="container">
        <div class="admin-summary" id="adminSummary"></div>
        <div class="admin-profile" id="adminProfile"></div>
        <div class="orders-actions">
            <button class="clear-orders-btn" id="clearOrdersBtn">Clear All Orders</button>
        </div>
        <div id="ordersContainer">
            <div class="empty-state">
                <div class="empty-state-icon">📋</div>
                <h3>No orders yet</h3>
                <p>Orders will appear here in real-time</p>
            </div>
        </div>

        <div class="reviews-section" style="margin-top: 48px;">
            <div class="orders-actions" style="justify-content: space-between; border-bottom: 2px solid #f1f1f1; padding-bottom: 12px; margin-bottom: 24px;">
                <h2 style="font-size: 20px; font-weight: 600; color: #1f1f1f; margin: 0;">Cafeteria Reviews</h2>
                <div id="adminReviewStats" style="font-size: 14px; color: #666; font-weight: 500;"></div>
            </div>
            <div id="reviewsContainer">
                <div class="empty-state">
                    <div class="empty-state-icon">⭐</div>
                    <h3>No reviews yet</h3>
                    <p>Customer feedback will appear here</p>
                </div>
            </div>
        </div>

        </div>
        </div>
    </div>
    </div>

    <script src="auth.js"></script>
    <script>
        const adminProfiles = {
            "1": {
                name: "Engineering Cafeteria 1",
                title: "Engineering Ops Briefing",
                tagline: "Keep students powered with fresh Jordanian breakfasts and hearty lunches.",
                details: [
                    { label: "Service Window", value: "07:30 - 17:00" },
                    { label: "Shift Lead", value: "Ahmad Khalil" },
                    { label: "Phone", value: "06-535-0221" }
                ],
                notes: [
                    "Prep Foul & Hummus platters before 07:00.",
                    "Start Maqluba preparation by 09:30 for lunch service.",
                    "Keep falafel frying station ready for sandwich orders."
                ]
            },
            "2": {
                name: "Engineering Cafeteria 2",
                title: "Annex Counter Checklist",
                tagline: "Fresh mezze and grilled specialties for engineers on the go.",
                details: [
                    { label: "Service Window", value: "08:00 - 19:00" },
                    { label: "Shift Lead", value: "Rami Haddad" },
                    { label: "Phone", value: "06-535-0224" }
                ],
                notes: [
                    "Prepare fresh Labneh plates with olive oil by 07:30.",
                    "Start Meat Biryani rice cooking by 10:00.",
                    "Keep shawarma spit rotating for beef sandwich orders."
                ]
            },
            "3": {
                name: "Medicine Cafeteria",
                title: "Clinical Fuel Center",
                tagline: "Nutritious Jordanian meals for medical students and staff.",
                details: [
                    { label: "Service Window", value: "06:30 - 16:30" },
                    { label: "Shift Lead", value: "Layla Mansour" },
                    { label: "Phone", value: "06-535-0310" }
                ],
                notes: [
                    "Warm Balila chickpea bowls ready by 06:15.",
                    "Marinate grilled chicken breasts the night before.",
                    "Keep halloumi cheese sliced for wrap orders."
                ]
            },
            "4": {
                name: "Business Cafeteria",
                title: "Business Service Suite",
                tagline: "Premium Jordanian cuisine for business students and faculty.",
                details: [
                    { label: "Service Window", value: "08:00 - 18:00" },
                    { label: "Shift Lead", value: "Samer Qasem" },
                    { label: "Phone", value: "06-535-0405" }
                ],
                notes: [
                    "Prepare Shakshuka pans fresh for breakfast orders.",
                    "Start Mansaf jameed sauce preparation by 09:00.",
                    "Form kafta patties before the lunch rush."
                ]
            },
            "5": {
                name: "Science Cafeteria",
                title: "Science Lab Pantry",
                tagline: "Traditional Jordanian flavors to fuel your discoveries.",
                details: [
                    { label: "Service Window", value: "07:45 - 18:15" },
                    { label: "Shift Lead", value: "Nadia Barakat" },
                    { label: "Phone", value: "06-535-0512" }
                ],
                notes: [
                    "Toast bread and prep chickpeas for Fatteh by 07:15.",
                    "Core and stuff zucchini for Kousa Mahshi before 10:00.",
                    "Prep mixed grill skewers during morning shift."
                ]
            },
            "6": {
                name: "Arts Cafeteria",
                title: "Arts Courtyard Service",
                tagline: "Creative mezze and traditional comfort food for artists.",
                details: [
                    { label: "Service Window", value: "09:00 - 20:00" },
                    { label: "Shift Lead", value: "Hana Sabbagh" },
                    { label: "Phone", value: "06-535-0618" }
                ],
                notes: [
                    "Prep hummus, baba ghanoush and tabbouleh for mezze platters.",
                    "Marinate Musakhan chicken with sumac overnight.",
                    "Keep fresh labneh and za'atar ready for wrap orders."
                ]
            },
            "7": {
                name: "Law Cafeteria",
                title: "Law Commons Command",
                tagline: "Hearty Jordanian meals for long study sessions.",
                details: [
                    { label: "Service Window", value: "07:30 - 21:00" },
                    { label: "Shift Lead", value: "Tariq Awad" },
                    { label: "Phone", value: "06-535-0702" }
                ],
                notes: [
                    "Start slow-cooking Ful Medames by 05:30.",
                    "Begin Lamb Kabsa rice preparation by 10:00.",
                    "Marinate Shish Tawook chicken for sandwich orders."
                ]
            },
            "8": {
                name: "Central Library Cafe",
                title: "Central Library Dispatch",
                tagline: "Quiet-friendly snacks and traditional Jordanian beverages.",
                details: [
                    { label: "Service Window", value: "07:00 - 23:00" },
                    { label: "Shift Lead", value: "Omar Nasser" },
                    { label: "Phone", value: "06-535-0888" }
                ],
                notes: [
                    "Slice fresh Knafeh portions every 2 hours.",
                    "Keep fresh mint stocked for mint tea orders.",
                    "Brew Arabic coffee with cardamom throughout the day."
                ]
            }
        };

        function getCafeteriaParam() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        }

        const userType = sessionStorage.getItem('userType');
        const storedCafeteriaId = sessionStorage.getItem('cafeteriaId');
        const paramCafeteriaId = getCafeteriaParam();
        const activeCafeteriaId = paramCafeteriaId || storedCafeteriaId;

        if (userType !== 'admin' || !activeCafeteriaId) {
            window.location.href = 'index.html';
        }

        if (storedCafeteriaId !== activeCafeteriaId) {
            sessionStorage.setItem('cafeteriaId', activeCafeteriaId);
        }

        const profile = adminProfiles[activeCafeteriaId] || null;
        const resolvedCafeteriaName = profile?.name || sessionStorage.getItem('cafeteriaName') || 'Assigned Cafeteria';

        sessionStorage.setItem('cafeteriaName', resolvedCafeteriaName);
        document.title = `${resolvedCafeteriaName} • Admin Dashboard`;

        const ordersContainer = document.getElementById('ordersContainer');
        const adminSummary = document.getElementById('adminSummary');
        const adminProfile = document.getElementById('adminProfile');

        adminSummary.innerHTML = `
            <span class="summary-label">Cafeteria</span>
            <span class="summary-value">${resolvedCafeteriaName}</span>
        `;

        renderAdminProfile(profile);

        function renderAdminProfile(profileData) {
            if (!profileData) {
                adminProfile.style.display = 'none';
                return;
            }

            const detailsMarkup = profileData.details && profileData.details.length
                ? `
                    <div class="profile-grid">
                        ${profileData.details.map(detail => `
                            <div class="profile-tile">
                                <span class="tile-label">${detail.label}</span>
                                <span class="tile-value">${detail.value}</span>
                            </div>
                        `).join('')}
                    </div>
                `
                : '';

            const notesMarkup = profileData.notes && profileData.notes.length
                ? `
                    <div class="profile-notes">
                        <span class="notes-label">Shift Notes</span>
                        <ul>
                            ${profileData.notes.map(note => `<li>${note}</li>`).join('')}
                        </ul>
                    </div>
                `
                : '';

            adminProfile.innerHTML = `
                <div class="profile-header">
                    <h2>${profileData.title}</h2>
                    <p>${profileData.tagline}</p>
                </div>
                ${detailsMarkup}
                ${notesMarkup}
            `;
        }

        function formatDateTime(date) {
            const day = date.getDate().toString().padStart(2, '0');
            const month = date.toLocaleString('default', { month: 'short' });
            const year = date.getFullYear();
            const hours = date.getHours().toString().padStart(2, '0');
            const minutes = date.getMinutes().toString().padStart(2, '0');
            return `${day} ${month} ${year} • ${hours}:${minutes}`;
        }

                async function fetchAdminOrders() {
            const { ok, data } = await apiCall(`/orders/cafeteria/${activeCafeteriaId}`);
            if (!ok) return;

            const orders = data || [];
            
            if (orders.length === 0) {
                ordersContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📋</div>
                        <h3>No orders yet</h3>
                        <p>Orders will appear here in real-time</p>
                    </div>
                `;
                return;
            }

            ordersContainer.innerHTML = `
                <div class="orders-list">
                    ${orders.map(order => {
                        return `
                            <div class="order-card">
                                <div class="order-header">
                                    <div class="order-cafeteria">${resolvedCafeteriaName}</div>
                                    <div class="order-meta">
                                        <span class="order-type order-type--${(order.orderType || 'Pickup').toLowerCase()}">${(order.orderType || 'Pickup').toUpperCase()}</span>
                                        <span class="order-type" style="background:#edf2f7;color:#333;margin-left:4px;">${order.status.toUpperCase()}</span>
                                        <span class="order-type">${order.paymentMethod || 'CASH'}</span>
                                        <span class="order-time">${formatDateTime(new Date(order.createdAt))}</span>
                                    </div>
                                </div>
                                ${order.deliveryLocation ? `
                                    <div class="delivery-location">
                                        <span class="location-icon">📍</span>
                                        <span class="location-text">${order.deliveryLocation}</span>
                                    </div>
                                ` : ''}
                                ${order.items.map(item => `
                                    <div class="order-item">
                                        <div class="order-details">
                                            <span class="order-item-name">${item.name}</span>
                                            ${item.addOns && item.addOns.length ? `
                                                <ul class="order-addons">
                                                    ${item.addOns.map(addOn => `
                                                        <li>${addOn.name}<span class="addon-price">${addOn.price} JOD</span></li>
                                                    `).join('')}
                                                </ul>
                                            ` : ''}
                                        </div>
                                        <span class="order-price">${item.price} JOD</span>
                                    </div>
                                `).join('')}
                                <div class="order-total">
                                    <strong>Total:</strong> ${order.total.toFixed(2)} JOD
                                </div>
                                <div class="order-user">
                                    <span class="order-user-name">${order.userName}</span>
                                    ${order.userPhone ? `<span class="order-user-phone">${order.userPhone}</span>` : ''}
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        async function fetchAdminReviews() {
            const reviewsContainer = document.getElementById('reviewsContainer');
            const adminReviewStats = document.getElementById('adminReviewStats');
            
            const { ok, data } = await apiCall(`/ratings/${activeCafeteriaId}`);
            if (!ok || !data) return;

            adminReviewStats.innerHTML = `<strong>${data.average.toFixed(1)}</strong> ⭐ (${data.total} reviews)`;

            if (data.reviews.length === 0) {
                reviewsContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⭐</div>
                        <h3>No reviews yet</h3>
                        <p>Customer feedback will appear here</p>
                    </div>
                `;
                return;
            }

            reviewsContainer.innerHTML = `
                <div class="orders-list">
                    ${data.reviews.map(r => `
                        <div class="order-card" style="border-left: 4px solid #f4a261;">
                            <div class="order-header" style="border-bottom: none; margin-bottom: 8px; padding-bottom: 0;">
                                <div class="order-meta">
                                    <div style="color: #f4a261; font-size: 14px; margin-bottom: 4px;">
                                        ${'★'.repeat(r.score)}${'☆'.repeat(5 - r.score)}
                                    </div>
                                </div>
                                <span class="order-time">${formatDateTime(new Date(r.createdAt))}</span>
                            </div>
                            ${r.comment ? `<p style="margin: 0 0 12px 0; font-size: 14px; color: #1f1f1f; line-height: 1.5;">"${r.comment}"</p>` : ''}
                            <div class="order-user" style="border-top: 1px solid #f1f1f1; padding-top: 12px;">
                                <span class="order-user-name" style="font-weight: 500; font-size: 13px; color: #666;">By: ${r.userName}</span>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        
        function updateAdminDashboard() {
            fetchAdminOrders();
            fetchAdminReviews();
        }

        updateAdminDashboard();

        document.getElementById('clearOrdersBtn').addEventListener('click', async function() {
            if (confirm('Are you sure you want to clear all orders for this cafeteria? This action cannot be undone.')) {
                const { ok } = await apiCall(`/orders/cafeteria/${activeCafeteriaId}/clear`, 'DELETE');
                if (ok) {
                    fetchAdminOrders();
                } else {
                    alert('Failed to clear orders. Please try again.');
                }
            }
        });

        setInterval(updateAdminDashboard, 2000);


        document.getElementById('adminLogoutBtn').addEventListener('click', () => {
            logout();
        });
    </script>
</body>
</html>
